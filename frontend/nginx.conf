server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/healthz {
        return 200 '{"status":"ok","service":"gke-node-scaler-ui"}';
        add_header Content-Type application/json;
    }
}